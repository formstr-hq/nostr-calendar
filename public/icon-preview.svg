<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="calendarClip">
      <rect x="80" y="80" width="352" height="352" rx="77"/>
    </clipPath>
  </defs>

  <!-- Outer background: white (light mode) -->
  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>

  <!-- Calendar widget background -->
  <rect x="80" y="80" width="352" height="352" rx="77" fill="#111111"/>

  <!-- Red header strip -->
  <rect x="80" y="80" width="352" height="110" fill="#E24B4A" clip-path="url(#calendarClip)"/>

  <!-- Month label -->
  <text x="256" y="135"
        font-family="system-ui, sans-serif"
        font-weight="bold"
        font-size="55"
        fill="rgba(255,255,255,0.85)"
        text-anchor="middle"
        dominant-baseline="middle">JAN</text>

  <!-- Date number -->
  <text x="256" y="262"
        font-family="system-ui, sans-serif"
        font-weight="bold"
        font-size="128"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle">3</text>

  <!-- Year -->
  <text x="256" y="376"
        font-family="system-ui, sans-serif"
        font-weight="bold"
        font-size="48"
        fill="rgba(255,255,255,0.6)"
        text-anchor="middle"
        dominant-baseline="middle">2009</text>
</svg>
