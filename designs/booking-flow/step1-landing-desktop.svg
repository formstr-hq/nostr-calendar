<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- Cover banner -->
  <rect width="1440" height="220" fill="#f5f5f5"/>

  <!-- Avatar circle -->
  <circle cx="720" cy="220" r="52" fill="#e0e0e0" stroke="#ffffff" stroke-width="4"/>
  <text x="720" y="228" text-anchor="middle" fill="#555" font-size="22" font-weight="600">AK</text>

  <!-- Author name -->
  <text x="720" y="308" text-anchor="middle" fill="#000" font-size="26" font-weight="700">Alex Kim</text>

  <!-- Handle -->
  <text x="720" y="336" text-anchor="middle" fill="#888" font-size="14">@alexkim · Product Designer</text>

  <!-- Divider -->
  <rect x="692" y="356" width="56" height="2" fill="#e0e0e0"/>

  <!-- Section heading -->
  <text x="720" y="386" text-anchor="middle" fill="#000" font-size="20" font-weight="600">Book a Session</text>

  <!-- Description -->
  <text x="720" y="418" text-anchor="middle" fill="#555" font-size="14">Schedule time with me for design reviews, career advice, portfolio feedback,</text>
  <text x="720" y="438" text-anchor="middle" fill="#555" font-size="14">or a general chat about product and design. I'm here to help.</text>

  <!-- Duration label -->
  <text x="720" y="484" text-anchor="middle" fill="#999" font-size="11" font-weight="600" letter-spacing="1">CHOOSE A DURATION</text>

  <!-- Duration card 1: 15 min -->
  <rect x="390" y="502" width="200" height="108" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="414" y="530" fill="#000" font-size="18" font-weight="700">15 min</text>
  <text x="414" y="554" fill="#888" font-size="13">Quick chat</text>
  <rect x="414" y="572" width="160" height="1" fill="#f0f0f0"/>
  <text x="414" y="594" fill="#000" font-size="14" font-weight="600">Free</text>

  <!-- Duration card 2: 30 min -->
  <rect x="620" y="502" width="200" height="108" rx="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="644" y="530" fill="#000" font-size="18" font-weight="700">30 min</text>
  <text x="644" y="554" fill="#888" font-size="13">Deep dive</text>
  <rect x="644" y="572" width="160" height="1" fill="#f0f0f0"/>
  <text x="644" y="594" fill="#000" font-size="14" font-weight="600">$25</text>
  <!-- Selected indicator -->
  <circle cx="798" cy="519" r="6" fill="#000"/>

  <!-- Duration card 3: 60 min -->
  <rect x="850" y="502" width="200" height="108" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="874" y="530" fill="#000" font-size="18" font-weight="700">60 min</text>
  <text x="874" y="554" fill="#888" font-size="13">Full session</text>
  <rect x="874" y="572" width="160" height="1" fill="#f0f0f0"/>
  <text x="874" y="594" fill="#000" font-size="14" font-weight="600">$50</text>

  <!-- Next button -->
  <rect x="580" y="640" width="280" height="52" rx="6" fill="#000"/>
  <text x="720" y="672" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Continue →</text>

  <!-- Footer -->
  <text x="720" y="874" text-anchor="middle" fill="#bbb" font-size="12">Powered by Formstr</text>
</svg>
