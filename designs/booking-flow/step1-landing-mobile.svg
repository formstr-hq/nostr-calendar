<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="390" height="844" fill="#ffffff"/>

  <!-- Status bar -->
  <text x="20" y="22" fill="#000" font-size="13" font-weight="600">9:41</text>
  <text x="350" y="22" fill="#000" font-size="11">●●●</text>

  <!-- Cover banner -->
  <rect y="32" width="390" height="150" fill="#f5f5f5"/>

  <!-- Avatar -->
  <circle cx="195" cy="182" r="40" fill="#e0e0e0" stroke="#ffffff" stroke-width="3"/>
  <text x="195" y="190" text-anchor="middle" fill="#555" font-size="17" font-weight="600">AK</text>

  <!-- Author name -->
  <text x="195" y="244" text-anchor="middle" fill="#000" font-size="20" font-weight="700">Alex Kim</text>
  <text x="195" y="268" text-anchor="middle" fill="#888" font-size="12">@alexkim · Product Designer</text>

  <!-- Divider -->
  <rect x="175" y="284" width="40" height="2" fill="#e0e0e0"/>

  <!-- Heading -->
  <text x="195" y="308" text-anchor="middle" fill="#000" font-size="17" font-weight="600">Book a Session</text>

  <!-- Description -->
  <text x="195" y="334" text-anchor="middle" fill="#555" font-size="12">Schedule time with me for design reviews,</text>
  <text x="195" y="352" text-anchor="middle" fill="#555" font-size="12">career advice, or a general chat about design.</text>

  <!-- Duration label -->
  <text x="195" y="394" text-anchor="middle" fill="#999" font-size="10" font-weight="600" letter-spacing="1">CHOOSE A DURATION</text>

  <!-- Card 1: 15 min -->
  <rect x="24" y="410" width="342" height="66" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="44" y="434" fill="#000" font-size="15" font-weight="700">15 min</text>
  <text x="44" y="456" fill="#888" font-size="12">Quick chat</text>
  <text x="330" y="448" text-anchor="end" fill="#000" font-size="13" font-weight="600">Free</text>

  <!-- Card 2: 30 min (selected) -->
  <rect x="24" y="490" width="342" height="66" rx="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="44" y="514" fill="#000" font-size="15" font-weight="700">30 min</text>
  <text x="44" y="536" fill="#888" font-size="12">Deep dive</text>
  <text x="330" y="528" text-anchor="end" fill="#000" font-size="13" font-weight="600">$25</text>
  <circle cx="348" cy="506" r="5" fill="#000"/>

  <!-- Card 3: 60 min -->
  <rect x="24" y="570" width="342" height="66" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="44" y="594" fill="#000" font-size="15" font-weight="700">60 min</text>
  <text x="44" y="616" fill="#888" font-size="12">Full session</text>
  <text x="330" y="608" text-anchor="end" fill="#000" font-size="13" font-weight="600">$50</text>

  <!-- Continue button -->
  <rect x="24" y="664" width="342" height="52" rx="6" fill="#000"/>
  <text x="195" y="696" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">Continue →</text>

  <!-- Footer -->
  <text x="195" y="820" text-anchor="middle" fill="#bbb" font-size="11">Powered by Formstr</text>
</svg>
