name: Build Debug APK (Label Trigger)

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  build-debug-apk:
    # Only run when the label is exactly "build-apk"
    if: github.event.label.name == 'build-apk'

    runs-on: ubuntu-latest

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) throw new Error("No pull request found in event");

            return {
              number: pr.number,
              head_ref: pr.head.ref,
              sha: pr.head.sha
            };

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        working-directory: android
        run: chmod +x gradlew

      - name: Compile App
        run: pnpm i && pnpm build

      - name: Sync Android
        run: pnpm cap sync android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-pr-${{ fromJSON(steps.pr.outputs.result).number }}
          path: |
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "📦 **Debug APK build complete**",
                "",
                `🔗 Workflow run: ${runUrl}`,
                "",
                "📎 Download the APK from the **Artifacts** section."
              ].join("\n")
            });
