name: Build Debug APK (PR + Manual)

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr;

            if (context.eventName === "pull_request") {
              pr = context.payload.pull_request;
            }

            if (context.eventName === "workflow_dispatch") {
              const prNumber = Number('${{ inputs.pr_number }}');
              pr = (await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              })).data;
            }

            return {
              number: pr.number,
              sha: pr.head.sha
            };

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          fetch-depth: 0

      # ✅ Node + pnpm setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (pnpm)
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile --no-interactive

      # ⚠️ your web build
      - name: Build Web App
        run: pnpm build

      # ⚡ Capacitor sync
      - name: Sync Capacitor
        run: pnpm cap sync android

      # ✅ Java for Android
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Debug repo structure
        run: ls -R

      # ⚠️ IMPORTANT: correct gradlew path
      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-pr-${{ fromJSON(steps.pr.outputs.result).number }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Comment on PR (only for PR trigger)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}` +
              `/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "📦 **Debug APK build completed**",
                "",
                `🔗 Workflow run: ${runUrl}`,
                "",
                "📎 Download APK from Artifacts."
              ].join("\n")
            });
